name: Tests
on: push
jobs:
  actions:
    runs-on: ubuntu-latest
    steps:
    - name: Copia repositorio
      uses: actions/checkout@v2
    - name: Construye imagen
      run: docker build --tag coordEjecu/mip .
    - name: Verifica el formato
      run: docker run coordEjecu/mip make check
    - name: Corre pruebas y evalúa cobertura
      run: docker run coordEjecu/mip make coverage
    - name: Corre reporte
      run: docker run -v $PWD:/workdir coordEjecu/mip:latest make reports/duty.pdf
    - name: Sube artefacto
      uses: actions/upload-artifact@v4
      with:
        name: reportes
        path: reports/duty.pdf
